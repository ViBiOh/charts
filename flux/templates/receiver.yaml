---
apiVersion: notification.toolkit.fluxcd.io/v1
kind: Receiver
metadata:
  name: {{ include "app.fullname" . }}
  labels: {{- include "app.labels" . | nindent 4 }}
spec:
  type: {{- include "app.receiver_type" .Values.repository.type -}}
  interval: 6h
  events:
  {{- if eq .Values.repository.type "github" }}
    - ping
    - push
  {{- else if eq .Values.repository.type "gitlab" }}
    - Push Hook
  {{- end }}
  secretRef:
    name: {{ .Values.receiver.token }}
  resources:
    - kind: GitRepository
      name: {{ include "app.fullname" . }}

---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: {{ include "app.fullname" . }}
  labels: {{- include "app.labels" . | nindent 4 }}
spec:
  providerRef:
    name: {{ include "app.fullname" . }}
  eventSeverity: info
  eventSources:
    - kind: Kustomization
      name: {{ include "app.fullname" . }}

{{- if or (eq .Values.repository.type "github") (eq .Values.repository.type "gitlab") }}
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: {{ include "app.fullname" . }}
  labels: {{- include "app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.repository.type }}
  address: https://{{ include "app.git_url" .Values.repository.type }}/{{ default .Values.repository.name .Values.repository.id }}
  secretRef:
    name: {{ .Values.repository.token }}
{{ end }}
